<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>勇者鬥惡龍：邏輯聖殿的九重試煉</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: "Microsoft JhengHei", sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-container { position: relative; width: 640px; margin: 20px auto; }
        canvas { background-color: #000; border: 4px solid #fff; display: block; }
        #dialog-box { background: #111; border: 2px solid #fff; padding: 15px; margin-top: 10px; min-height: 60px; text-align: left; font-size: 18px; }
        .stats { color: #0f0; margin-top: 5px; font-weight: bold; }
        #puz-window, #battle-window { position: absolute; top: 20px; left: 80px; width: 480px; background: rgba(0,0,50,0.95); border: 3px solid #ffd700; padding: 20px; box-sizing: border-box; display: none; z-index: 10; }
        #battle-window { background: rgba(60,0,0,0.95); border-color: #f00; }
        button { background: #fff; border: none; padding: 8px 15px; margin: 5px; font-size: 15px; cursor: pointer; font-weight: bold; display: block; width: 100%; text-align: left; }
        button:hover { background: #ffd700; color: #000; }
    </style>
</head>
<body>

    <h1 id="game-title">⚔️ 邏輯聖殿：九重試煉（第 1 關） ⚔️</h1>
    <p>💡 提示：按方向鍵移動。此版本地圖由 DFS 演算法即時生成，保證 100% 絕對有解、絕無死路！</p>

    <div id="game-container">
        <canvas id="gameCanvas" width="640" height="416"></canvas>
        
        <div id="dialog-box">
            <div id="log-msg">【系統】尋找拉桿解開邏輯封印，前往迷宮終點吧！</div>
            <div class="stats" id="status-bar">勇者 HP: 100/100 | 基礎傷害: 20 | 裝備: 生鏽鐵劍</div>
        </div>

        <div id="puz-window">
            <h3 id="puz-title" style="color:#ffd700; margin-top:0;">🧩 邏輯封印</h3>
            <p id="puz-text" style="line-height: 1.6; font-size: 16px;"></p>
            <div id="puz-buttons"></div>
        </div>

        <div id="battle-window">
            <h3 id="battle-title" style="color:#ff6464; margin-top:0;">💥 魔王遭遇戰</h3>
            <p id="battle-hp">魔王 HP: 100 | 你的 HP: 100</p>
            <button style="text-align:center;" onclick="playerAttack()">⚔️ 發動猛烈斬擊</button>
        </div>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const GRID_SIZE = 32;

// 迷宮規格：高 13 格，寬 20 格
const MAP_ROWS = 13;
const MAP_COLS = 20;

let currentLevel = 1;
let pX = 1, pY = 1;
let pHP = 100, pMaxHP = 100, pAtk = 20;
let eHP = 100; 
let gameState = "MAP"; 
let levelCleared = false; 
let GAME_MAP = [];

// 🎯 隨機 DFS 迷宮生成演算法：確保地圖全連通，物理上絕對不會有死路
function generatePerfectMaze() {
    // 1. 初始化全為牆壁 (1)
    let maze = [];
    for (let r = 0; r < MAP_ROWS; r++) {
        maze.push(new Array(MAP_COLS).fill(1));
    }

    // 2. DFS 挖路打通（以奇數格子作為節點）
    let visited = [];
    for (let r = 0; r < MAP_ROWS; r++) visited.push(new Array(MAP_COLS).fill(false));

    function walk(cx, cy) {
        visited[cy][cx] = true;
        maze[cy][cx] = 0; // 挖開成空地

        // 定義四個方向，每次移動 2 格
        let dirs = [
            [0, -2], [0, 2], [-2, 0], [2, 0]
        ];
        // 隨機打亂方向打通迷宮
        dirs.sort(() => Math.random() - 0.5);

        for (let i = 0; i < dirs.length; i++) {
            let nx = cx + dirs[i][0];
            let ny = cy + dirs[i][1];

            if (nx > 0 && nx < MAP_COLS - 1 && ny > 0 && ny < MAP_ROWS - 1) {
                if (!visited[ny][nx]) {
                    // 挖開這兩格之間的牆壁
                    maze[cy + dirs[i][1] / 2][cx + dirs[i][0] / 2] = 0;
                    walk(nx, ny);
                }
            }
        }
    }

    // 從 (1,1) 開始挖迷宮
    walk(1, 1);

    // 3. 確保起點周圍暢通
    maze[1][1] = 0; 
    pX = 1; pY = 1;

    // 4. 尋找地圖後半段的合適位置放置「拉桿 (2)」與「終點 (3)」
    // 為確保絕對有路，我們只在已經被演算法挖開的空地 (0) 上放物件
    let candidates = [];
    for (let r = 1; r < MAP_ROWS - 1; r++) {
        for (let c = 1; c < MAP_COLS - 1; c++) {
            if (maze[r][c] === 0 && (r !== 1 || c !== 1)) {
                candidates.push({x: c, y: r});
            }
        }
    }

    // 依據與起點的距離排序，把拉桿放中後半段，終點放最遠處
    candidates.sort((a, b) => (b.x + b.y) - (a.x + a.y));

    let endPos = candidates[0];                   // 最遠的做終點
    let leverPos = candidates[Math.floor(candidates.length / 2)]; // 中間的做拉桿

    maze[leverPos.y][leverPos.x] = 2;
    maze[endPos.y][endPos.x] = 3;

    return maze;
}

const RIDDLES = {
    1: { title: "🧩 第一關：三衛兵說謊謎題", text: "門口有三個衛兵。A說：『B在說謊』；B說：『C在說謊』；C說：『A和B都在說謊』。請問誰說的是真話？", options: ["A 說真話", "B 說真話", "C 說真話", "大家都在說謊"], correct: 1, success: "【成功】封印解除，獲得「鋼鐵長劍」(攻擊力+15)。" },
    2: { title: "🧩 第二關：天使與惡魔", text: "路口有兩個人，一個永遠說真話（天使），一個永遠說謊（惡魔）。你想知道哪條是正確的路。你只能問其中一人一個問題，以下哪句話能幫你找到正確的路？", options: ["「你是天使嗎？」", "「如果我問另一個人，他會說哪條是正確的路？」", "「正確的路在哪裡？」"], correct: 1, success: "【成功】最大生命值提升 30，通道開啟。" },
    3: { title: "🧩 第三關：誰偷了寶石？", text: "寶石被偷了，嫌犯有甲、乙、丙三人。甲說：『是乙偷的』；乙說：『不是我偷的』；丙說：『反正不是我偷的』。已知這三人中只有一個人說真話，是誰偷的？", options: ["甲偷的", "乙偷的", "丙偷的"], correct: 2, success: "【成功】獲得「精靈魔刃」(攻擊力+20)，前方魔王現身！", boss: { name: "🧌 迷宮看守者 (初級魔王)", hp: 120, atk: 18 } },
    4: { title: "🧩 第四關：四兄弟的實話", text: "四兄弟中有一人打破玻璃。老大說：『是老二破的』；老二說：『是老慢破的』；老三說：『反正不是我』；老四說：『老二在撒謊』。只有一人說真話，是誰打破的？", options: ["老大", "老二", "老三", "老四"], correct: 2, success: "【成功】完美擊破謊言！勇者生命值全面補滿。" },
    5: { title: "🧩 第五關：誠實族與謊言族", text: "旅行者來到一個島，島上有誠實族與謊言族。他遇到一個人A，問他：『你是誠實族的嗎？』A嘟囔了一句聽不清。旁邊的B說：『A說他是，但我才是誠實族的。』請問B是什麼族？", options: ["誠實族", "謊言族", "無法確定"], correct: 1, success: "【成功】看穿島民的詭計！獲得「防禦聖徽」。" },
    6: { title: "🧩 第六關：三色盒子的秘密", text: "金、銀、鐵三個盒子。金盒寫：『寶石不在此盒』；銀盒寫：『寶石在金盒』；鐵盒寫：『寶石不在銀盒』。三個標籤只有一個是真話。寶石在哪裡？", options: ["金盒子", "銀盒子", "鐵盒子"], correct: 0, success: "【成功】獲得「龍騎士巨劍」(攻擊力+30)！", boss: { name: "👹 鍊獄巨魔 (中級魔王)", hp: 200, atk: 25 } },
    7: { title: "🧩 第七關：誰及格了？", text: "張、王、李三人查成績。張說：『我及格了』；王說：『李及格了』；李說：『王說的是真話』。已知這三人中有一人不及格，且只有不及格的人說了假話，誰不及格？", options: ["張不及格", "王不及格", "李不及格"], correct: 1, success: "【成功】推導正確！最大生命值增幅 50 點。" },
    8: { title: "🧩 第八關：三個嫌疑犯", text: "警察審問A、B、C三人。A說：『B在說謊』；B說：『C在說謊』；C說：『我們三人都在說謊』。請問這三人中究竟有幾個說謊者？", options: ["1 個", "2 個", "3 個"], correct: 1, success: "【成功】全屬性大幅提升，準備迎接最終一戰！" },
    9: { title: "🧩 第九關：真理之門的考驗", text: "守門人給了你一個機會。他說：『如果你接下來說的句子是真話，我會用火燒死你；如果你說的是假話，我會用冰凍死你。』為了活命，你應該對守門人說哪句話？", options: ["「你會用火燒死我」", "「你會用冰凍死我」", "「我正在說謊」"], correct: 1, success: "【終極成功】神之邏輯！獲得「真理聖劍」！", boss: { name: "🐉 終焉混沌神龍 (最終魔王)", hp: 350, atk: 35 } }
};

// 初始化第一關地圖
GAME_MAP = generatePerfectMaze();

const imgs = { player: new Image(), wall: new Image(), lever: new Image(), monster: new Image() };
let imgLoaded = { player: false, wall: false, lever: false, monster: false };

imgs.player.src = 'player.png';   imgs.player.onload = () => { imgLoaded.player = true; drawGame(); };
imgs.wall.src = 'wall.png';       imgs.wall.onload = () => { imgLoaded.wall = true; drawGame(); };
imgs.lever.src = 'lever.png';     imgs.lever.onload = () => { imgLoaded.lever = true; drawGame(); };
imgs.monster.src = 'monster.png'; imgs.monster.onload = () => { imgLoaded.monster = true; drawGame(); };

function drawTile(x, y, defaultColor, imgObj, isLoaded) {
    if (isLoaded) {
        try { ctx.drawImage(imgObj, x, y, GRID_SIZE, GRID_SIZE); } 
        catch(e) { ctx.fillStyle = defaultColor; ctx.fillRect(x, y, GRID_SIZE - 1, GRID_SIZE - 1); }
    } else {
        ctx.fillStyle = defaultColor; ctx.fillRect(x, y, GRID_SIZE - 1, GRID_SIZE - 1);
    }
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(let r=0; r<GAME_MAP.length; r++) {
        for(let c=0; c<GAME_MAP[r].length; c++) {
            let tile = GAME_MAP[r][c];
            let posX = c * GRID_SIZE;
            let posY = r * GRID_SIZE;
            
            if(tile === 1) drawTile(posX, posY, '#444', imgs.wall, imgLoaded.wall);
            else if(tile === 2) drawTile(posX, posY, '#ffd700', imgs.lever, imgLoaded.lever);
            else if(tile === 3) {
                if([3, 6, 9].includes(currentLevel)) {
                    drawTile(posX, posY, '#f00', imgs.monster, imgLoaded.monster);
                } else {
                    ctx.fillStyle = levelCleared ? "#00ffcc" : "#ff3333";
                    ctx.fillRect(posX, posY, GRID_SIZE-1, GRID_SIZE-1);
                }
            }
        }
    }
    drawTile(pX * GRID_SIZE, pY * GRID_SIZE, '#007bff', imgs.player, imgLoaded.player);
}

window.addEventListener("keydown", function(e) {
    if(gameState !== "MAP") return;
    let nextX = pX, nextY = pY;
    if(e.key === "ArrowUp") nextY--;
    else if(e.key === "ArrowDown") nextY++;
    else if(e.key === "ArrowLeft") nextX--;
    else if(e.key === "ArrowRight") nextX++;
    
    if(GAME_MAP[nextY] && GAME_MAP[nextY][nextX] !== 1) {
        pX = nextX; pY = nextY;
        let currentTile = GAME_MAP[pY][pX];
        
        if(currentTile === 2) {
            gameState = "PUZ";
            openPuzzle();
        } else if(currentTile === 3) {
            if(!levelCleared) {
                document.getElementById("log-msg").innerText = "🔒 終點封印中！你必須先解開本關拉桿的邏輯謎題！";
            } else {
                if([3, 6, 9].includes(currentLevel)) {
                    gameState = "BATTLE";
                    setupBossBattle();
                } else {
                    nextLevel();
                }
            }
        }
    }
    drawGame();
});

function openPuzzle() {
    const data = RIDDLES[currentLevel];
    document.getElementById("puz-title").innerText = `🧩 第 ${currentLevel} 關：` + data.title.split("：")[1];
    document.getElementById("puz-text").innerText = data.text;
    
    const btnContainer = document.getElementById("puz-buttons");
    btnContainer.innerHTML = ""; 
    
    data.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.innerText = (index+1) + ". " + opt;
        btn.onclick = () => checkAnswer(index);
        btnContainer.appendChild(btn);
    });
    document.getElementById("puz-window").style.display = "block";
}

function checkAnswer(selectedIndex) {
    document.getElementById("puz-window").style.display = "none";
    const data = RIDDLES[currentLevel];
    
    if(selectedIndex === data.correct) {
        levelCleared = true;
        document.getElementById("log-msg").innerText = data.success + " 終點通道已開放！";
        GAME_MAP[pY][pX] = 0; 
    } else {
        pHP -= 20;
        document.getElementById("log-msg").innerText = "❌【邏輯謬誤】扣除 20 點生命值。請再踩一次拉桿挑戰！";
        if(pHP <= 0) {
            document.getElementById("log-msg").innerText = "💀 挑戰失敗。請重新整理網頁。";
            gameState = "GAMEOVER";
        }
    }
    updateUIStatus();
    gameState = "MAP";
    drawGame();
}

function setupBossBattle() {
    const bData = RIDDLES[currentLevel].boss;
    eHP = bData.hp;
    document.getElementById("battle-title").innerText = bData.name;
    updateBattleUI();
    document.getElementById("battle-window").style.display = "block";
}

function nextLevel() {
    if(currentLevel === 9) {
        document.getElementById("log-msg").innerText = "🎉【神話通關】你成功突破了聖殿九重考驗！你是真正的邏輯大師！";
        gameState = "WIN";
        return;
    }
    currentLevel++;
    levelCleared = false;
    GAME_MAP = generatePerfectMaze(); // 重新用演算法隨機生成下一關迷宮
    document.getElementById("game-title").innerText = `⚔️ 邏輯聖殿：九重試煉（第 ${currentLevel} 關） ⚔️`;
    document.getElementById("log-msg").innerText = `🎉 晉級成功！進入第 ${currentLevel} 關迷宮。`;
    updateUIStatus();
    drawGame();
}

function updateUIStatus() {
    let weaponName = currentLevel >= 9 ? "真理聖劍" : (currentLevel >= 6 ? "龍騎士巨劍" : (currentLevel >= 3 ? "精靈魔刃" : "生鏽鐵劍"));
    document.getElementById("status-bar").innerText = `勇者 HP: ${pHP}/${pMaxHP} | 基礎傷害: ${pAtk} | 裝備: ${weaponName}`;
}

function updateBattleUI() {
    const bData = RIDDLES[currentLevel].boss;
    document.getElementById("battle-hp").innerText = `${bData.name} HP: ${eHP} | 你的 HP: ${pHP}`;
}

function playerAttack() {
    let dmg = pAtk + Math.floor(Math.random()*12) - 4;
    eHP -= dmg;
    
    if(eHP <= 0) {
        document.getElementById("battle-window").style.display = "none";
        document.getElementById("log-msg").innerText = `⚔️ 成功擊殺當前守門魔王！`;
        nextLevel();
    } else {
        const bData = RIDDLES[currentLevel].boss;
        let eAtk = bData.atk + Math.floor(Math.random()*6) - 3; 
        pHP -= eAtk;
        if(pHP <= 0) {
            document.getElementById("battle-window").style.display = "none";
            document.getElementById("log-msg").innerText = "💀 挑戰失敗。請重新整理網頁。";
            gameState = "GAMEOVER";
        }
    }
    updateUIStatus();
    if(gameState === "BATTLE") updateBattleUI();
}

updateUIStatus();
drawGame();
</script>
</body>
</html>
